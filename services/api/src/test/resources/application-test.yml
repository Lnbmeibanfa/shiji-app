spring:
  datasource:
    url: jdbc:h2:mem:shiji_auth_test;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        globally_quoted_identifiers: true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

shiji:
  oss:
    enabled: false

# DashScope：测试环境不配置密钥，由用例 Mock 客户端；勿依赖本机环境变量。
recognition:
  task:
    timeout-seconds: 3
    retention-days: 7

dashscope:
  api-key: ""
  text-model: qwen-turbo
  vision:
    model: qwen3.6-flash
    confidence-threshold: 0.7
    max-edge: 1440
    jpeg-quality: 0.92
    timeout: 10s
